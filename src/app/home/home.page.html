<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Mis Tareas
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Mis Tareas</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-toast [isOpen]="isToastOpen" [message]="toastMessage" [duration]="5000" (didDismiss)="setOpen(false)"
    position="top"></ion-toast>

  <div id="container">
    <ion-item *ngIf="tasks.length === 0" lines="none">
      <ion-label class="ion-text-center">
        <ion-icon name="checkmark-done-circle-outline" style="font-size: 64px; color: #ffffff;"></ion-icon>
        <p style="margin-top: 10px;">¡No hay tareas! Agrega una nueva</p>
      </ion-label>
    </ion-item>

    <ion-list>
      <ion-item-sliding *ngFor="let task of tasks">
        <ion-item [color]="task.done ? 'success' : ''">
          <ion-checkbox slot="start" [checked]="task.done" (ionChange)="toggleTask(task, $event)"></ion-checkbox>
          <ion-label (click)="updateTask(task)">
            <h2 [style.textDecoration]="task.done ? 'line-through' : 'none'" 
                [style.color]="task.done ? '#aaa' : 'white'">
              {{task.title}}
            </h2>
            <p *ngIf="task.done">Completada</p>
            <p *ngIf="!task.done">Pendiente</p>
          </ion-label>
        </ion-item>
        
        <ion-item-options side="end">
          <ion-item-option color="primary" (click)="updateTask(task)">
            <ion-icon name="create-outline" slot="start"></ion-icon>
            Editar
          </ion-item-option>
          <ion-item-option color="danger" (click)="deleteTask(task)">
            <ion-icon name="trash-outline" slot="start"></ion-icon>
            Eliminar
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>

    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button (click)="open()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  </div>
</ion-content>
